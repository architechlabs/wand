call_action:
  name: Call action
  description: Calls a Home Assistant service from a Wand remote action.
  fields:
    domain:
      name: Domain
      required: true
      selector:
        text:
    service:
      name: Service
      required: true
      selector:
        text:
    target:
      name: Target
      required: false
      selector:
        object:
    service_data:
      name: Service data
      required: false
      selector:
        object:

reload_frontend:
  name: Reload frontend
  description: Re-registers the Wand Universal Remote static path and Lovelace resource.

refresh_entities:
  name: Refresh remote integrations
  description: Reloads integrations backing remote entities the calling user has permission to control.
  fields:
    entity_id:
      name: Entities
      required: true
      selector:
        entity:
          multiple: true
